<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Activities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf8f3;
      --surface: #ffffff;
      --text: #1c1917;
      --text-muted: #78716c;
      --border: #e7e5e4;
      --radius: 18px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.13);

      --crafts:   #f97316;
      --cooking:  #eab308;
      --outdoor:  #22c55e;
      --science:  #3b82f6;
      --games:    #8b5cf6;
      --art:      #ec4899;
      --sensory:  #14b8a6;
      --learning: #f59e0b;
      --seasonal: #ef4444;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 48px 24px 36px;
      text-align: center;
    }
    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    header p {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 28px;
    }
    .search-wrap {
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      background: white;
      color: var(--text);
      outline: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    #search::placeholder { color: #9ca3af; font-weight: 400; }

    /* ── CATEGORY NAV ── */
    .cat-nav {
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .cat-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      align-items: center;
    }
    .cat-nav-inner::-webkit-scrollbar { display: none; }
    .cat-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 2px solid var(--border);
      border-radius: 50px;
      background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
    }
    .cat-btn:hover { border-color: #a78bfa; color: var(--text); transform: translateY(-1px); }
    .cat-btn.active { color: white; border-color: transparent; }
    .cat-btn[data-cat="all"].active       { background: #6d28d9; }
    .cat-btn[data-cat="crafts"].active    { background: var(--crafts); }
    .cat-btn[data-cat="cooking"].active   { background: var(--cooking); color: #1c1917; }
    .cat-btn[data-cat="outdoor"].active   { background: var(--outdoor); }
    .cat-btn[data-cat="science"].active   { background: var(--science); }
    .cat-btn[data-cat="games"].active     { background: var(--games); }
    .cat-btn[data-cat="art"].active       { background: var(--art); }
    .cat-btn[data-cat="sensory"].active   { background: var(--sensory); }
    .cat-btn[data-cat="learning"].active  { background: var(--learning); color: #1c1917; }
    .cat-btn[data-cat="seasonal"].active  { background: var(--seasonal); }

    /* ── MAIN ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    #count {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    .toolbar-right { display: flex; gap: 8px; }

    #random-btn {
      padding: 9px 18px;
      border: 2px solid #6d28d9;
      border-radius: 50px;
      background: white;
      color: #6d28d9;
      font-family: 'Nunito', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    #random-btn:hover { background: #6d28d9; color: white; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      border-top: 4px solid var(--border);
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

    .card[data-cat="crafts"]   { border-top-color: var(--crafts); }
    .card[data-cat="cooking"]  { border-top-color: var(--cooking); }
    .card[data-cat="outdoor"]  { border-top-color: var(--outdoor); }
    .card[data-cat="science"]  { border-top-color: var(--science); }
    .card[data-cat="games"]    { border-top-color: var(--games); }
    .card[data-cat="art"]      { border-top-color: var(--art); }
    .card[data-cat="sensory"]  { border-top-color: var(--sensory); }
    .card[data-cat="learning"] { border-top-color: var(--learning); }
    .card[data-cat="seasonal"] { border-top-color: var(--seasonal); }

    .card-body { padding: 20px; }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-emoji {
      font-size: 2rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      background: #f3f4f6;
      color: #374151;
    }
    .badge-cat {
      color: white;
    }
    .badge-cat[data-cat="crafts"]   { background: var(--crafts); }
    .badge-cat[data-cat="cooking"]  { background: var(--cooking); color: #1c1917; }
    .badge-cat[data-cat="outdoor"]  { background: var(--outdoor); }
    .badge-cat[data-cat="science"]  { background: var(--science); }
    .badge-cat[data-cat="games"]    { background: var(--games); }
    .badge-cat[data-cat="art"]      { background: var(--art); }
    .badge-cat[data-cat="sensory"]  { background: var(--sensory); }
    .badge-cat[data-cat="learning"] { background: var(--learning); color: #1c1917; }
    .badge-cat[data-cat="seasonal"] { background: var(--seasonal); }

    .difficulty-dots { display: flex; gap: 3px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #d1d5db; }
    .dot.filled { background: #374151; }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .no-results span { font-size: 3rem; display: block; margin-bottom: 16px; }
    .no-results h3 { font-size: 1.3rem; margin-bottom: 8px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 620px;
      margin: auto;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .modal-header-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }
    .modal-emoji { font-size: 2.8rem; line-height: 1; flex-shrink: 0; }
    .modal-title { font-size: 1.5rem; font-weight: 900; line-height: 1.2; padding-right: 40px; }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #f3f4f6;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: #e5e7eb; }

    .modal-meta { display: flex; gap: 8px; flex-wrap: wrap; }

    .modal-body { padding: 24px 28px; }

    .modal-desc {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .modal-section { margin-bottom: 24px; }
    .modal-section h3 {
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .supplies-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      list-style: none;
    }
    .supplies-list li {
      padding: 6px 12px;
      background: #f3f4f6;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .steps-list { list-style: none; }
    .steps-list li {
      display: flex;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .steps-list li:last-child { border-bottom: none; }
    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #ede9fe;
      color: #6d28d9;
      font-weight: 800;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tip-box {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      border-radius: 0 12px 12px 0;
      padding: 14px 16px;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .tip-box strong { color: #92400e; }

    @media (max-width: 640px) {
      header { padding: 36px 16px 28px; }
      main { padding: 20px 14px 50px; }
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal { border-radius: 24px 24px 0 0; max-width: 100%; }
      .modal-header { padding: 24px 20px 16px; }
      .modal-body { padding: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>🌟 Kids Activities</h1>
  <p>Crafts, cooking, outdoor adventures, science, and more</p>
  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="search" id="search" placeholder="Search activities, supplies, ideas...">
  </div>
</header>

<nav class="cat-nav">
  <div class="cat-nav-inner">
    <button class="cat-btn active" data-cat="all">⭐ All</button>
    <button class="cat-btn" data-cat="crafts">✂️ Crafts</button>
    <button class="cat-btn" data-cat="cooking">🍳 Cooking</button>
    <button class="cat-btn" data-cat="outdoor">🌿 Outdoor</button>
    <button class="cat-btn" data-cat="science">🔬 Science</button>
    <button class="cat-btn" data-cat="games">🎮 Games</button>
    <button class="cat-btn" data-cat="art">🎨 Art</button>
    <button class="cat-btn" data-cat="sensory">🤲 Sensory</button>
    <button class="cat-btn" data-cat="learning">📚 Learning</button>
    <button class="cat-btn" data-cat="seasonal">🎄 Seasonal</button>
  </div>
</nav>

<main>
  <div class="toolbar">
    <span id="count"></span>
    <div class="toolbar-right">
      <button id="random-btn">🎲 Random Activity</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-top">
        <span class="modal-emoji" id="m-emoji"></span>
        <h2 class="modal-title" id="m-title"></h2>
      </div>
      <div class="modal-meta" id="m-meta"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc" id="m-desc"></p>
      <div class="modal-section">
        <h3>You'll Need</h3>
        <ul class="supplies-list" id="m-supplies"></ul>
      </div>
      <div class="modal-section">
        <h3>How To Do It</h3>
        <ol class="steps-list" id="m-steps"></ol>
      </div>
      <div class="modal-section" id="m-tip-section">
        <h3>Tip</h3>
        <div class="tip-box" id="m-tip"></div>
      </div>
    </div>
  </div>
</div>

<script src="data/activities.js"></script>
<script>
  const CATEGORIES = {
    all:      { label: 'All', emoji: '⭐' },
    crafts:   { label: 'Crafts', emoji: '✂️' },
    cooking:  { label: 'Cooking', emoji: '🍳' },
    outdoor:  { label: 'Outdoor', emoji: '🌿' },
    science:  { label: 'Science', emoji: '🔬' },
    games:    { label: 'Games', emoji: '🎮' },
    art:      { label: 'Art', emoji: '🎨' },
    sensory:  { label: 'Sensory', emoji: '🤲' },
    learning: { label: 'Learning', emoji: '📚' },
    seasonal: { label: 'Seasonal', emoji: '🎄' },
  };

  const CAT_LABELS = {
    crafts: 'Crafts', cooking: 'Cooking & Baking', outdoor: 'Outdoor',
    science: 'Science', games: 'Games & Play', art: 'Art',
    sensory: 'Sensory', learning: 'Learning', seasonal: 'Seasonal'
  };

  let currentCat = 'all';
  let currentSearch = '';

  const grid      = document.getElementById('grid');
  const countEl   = document.getElementById('count');
  const searchEl  = document.getElementById('search');
  const overlay   = document.getElementById('overlay');

  function difficultyDots(level) {
    const map = { easy: 1, medium: 2, hard: 3 };
    const filled = map[level] || 1;
    return `<span class="difficulty-dots">${[1,2,3].map(i =>
      `<span class="dot${i <= filled ? ' filled' : ''}"></span>`
    ).join('')}</span>`;
  }

  function filtered() {
    const q = currentSearch.toLowerCase().trim();
    return ACTIVITIES.filter(a => {
      const catMatch = currentCat === 'all' || a.category === currentCat;
      if (!catMatch) return false;
      if (!q) return true;
      return (
        a.title.toLowerCase().includes(q) ||
        a.description.toLowerCase().includes(q) ||
        a.category.toLowerCase().includes(q) ||
        a.supplies.some(s => s.toLowerCase().includes(q))
      );
    });
  }

  function render() {
    const items = filtered();
    countEl.textContent = `${items.length} activit${items.length === 1 ? 'y' : 'ies'}`;

    if (items.length === 0) {
      grid.innerHTML = `<div class="no-results">
        <span>🔍</span>
        <h3>Nothing found</h3>
        <p>Try a different search or browse a different category.</p>
      </div>`;
      return;
    }

    grid.innerHTML = items.map(a => `
      <div class="card" data-cat="${a.category}" data-id="${a.id}" tabindex="0" role="button" aria-label="${a.title}">
        <div class="card-body">
          <div class="card-top">
            <span class="card-emoji">${a.emoji}</span>
            <span class="card-title">${a.title}</span>
          </div>
          <p class="card-desc">${a.description}</p>
          <div class="card-meta">
            <span class="badge badge-cat" data-cat="${a.category}">${CAT_LABELS[a.category]}</span>
            <span class="badge">⏱ ${a.time}</span>
            <span class="badge">👶 ${a.ages}</span>
            <span class="badge">${difficultyDots(a.difficulty)}</span>
          </div>
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openModal(+card.dataset.id));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(+card.dataset.id); });
    });
  }

  function openModal(id) {
    const a = ACTIVITIES.find(x => x.id === id);
    if (!a) return;

    document.getElementById('m-emoji').textContent = a.emoji;
    document.getElementById('m-title').textContent = a.title;
    document.getElementById('m-desc').textContent = a.description;

    document.getElementById('m-meta').innerHTML = `
      <span class="badge badge-cat" data-cat="${a.category}">${CAT_LABELS[a.category]}</span>
      <span class="badge">⏱ ${a.time}</span>
      <span class="badge">👶 Ages ${a.ages}</span>
      <span class="badge">${difficultyDots(a.difficulty)} ${a.difficulty.charAt(0).toUpperCase() + a.difficulty.slice(1)}</span>
    `;

    document.getElementById('m-supplies').innerHTML =
      a.supplies.map(s => `<li>${s}</li>`).join('');

    document.getElementById('m-steps').innerHTML =
      a.steps.map((s, i) =>
        `<li><span class="step-num">${i + 1}</span><span>${s}</span></li>`
      ).join('');

    const tipSection = document.getElementById('m-tip-section');
    const tipEl = document.getElementById('m-tip');
    if (a.tips) {
      tipEl.innerHTML = `<strong>💡 Tip:</strong> ${a.tips}`;
      tipSection.style.display = '';
    } else {
      tipSection.style.display = 'none';
    }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  let searchTimer;
  searchEl.addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentSearch = e.target.value;
      render();
    }, 200);
  });

  document.getElementById('random-btn').addEventListener('click', () => {
    const items = filtered();
    if (!items.length) return;
    const random = items[Math.floor(Math.random() * items.length)];
    openModal(random.id);
  });

  render();
</script>
</body>
</html>
